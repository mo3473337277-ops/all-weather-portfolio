name: Backtest

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "allweather/**"
      - "data/**"
      - "pyproject.toml"
      - ".github/workflows/backtest.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Run full backtest
        run: |
          python -X utf8 main.py | tee backtest_output.txt

      - name: Verify output files
        run: |
          test -f output/nv_curves.csv  || (echo "❌ nv_curves.csv missing" && exit 1)
          test -f output/summary.json   || (echo "❌ summary.json missing" && exit 1)
          test -f output/weights.csv    || (echo "❌ weights.csv missing" && exit 1)
          echo "✅ All output files generated"
          ls -la output/

      - name: Sanity check key metrics
        run: |
          python -c "
          import json
          with open('output/summary.json', encoding='utf-8') as f:
              data = json.load(f)
          # V3c 多元 100% RP 应当：CAGR ≈ 8.77%, Sharpe ≈ 2.60
          v3c = data['V3c 多元_100% RP']
          assert 0.080 < v3c['cagr']   < 0.095,   f'CAGR 偏离: {v3c[\"cagr\"]:.4f}'
          assert 2.40  < v3c['sharpe'] < 2.80,    f'Sharpe 偏离: {v3c[\"sharpe\"]:.2f}'
          assert -0.04 < v3c['mdd']    < -0.02,   f'MDD 偏离: {v3c[\"mdd\"]:.4f}'
          print(f'✅ V3c 多元 验证通过: CAGR={v3c[\"cagr\"]*100:.2f}% Sharpe={v3c[\"sharpe\"]:.2f} MDD={v3c[\"mdd\"]*100:.2f}%')
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            output/
            backtest_output.txt
          retention-days: 30
